MEMORY {
	ZEROPAGE  : start = $0000, size = $0100, type = rw;
	PROGRAMRAM: start = $0FFF, size = $0C01, type = rw;
	VIDEORAM  : start = $1C00, size = $0400, type = rw;
}
SEGMENTS {
    ZEROPAGE: load = ZEROPAGE  , type = zp;
    CODE    : load = PROGRAMRAM, type = ro;
    RODATA  : load = PROGRAMRAM, type = ro;
    DATA    : load = PROGRAMRAM, type = rw;
	BSS     : load = VIDEORAM  , type = bss;
}

